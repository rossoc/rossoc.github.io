name: Scripta workflow

on:
  push:
    branches: ["main"]
  

permissions:
  contents: write
  deployments: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download Latest Scripta Binary
        run: |
          # Download the binary from the 'latest' alias
          curl -L https://github.com/rossoc/Scripta/releases/latest/download/Scripta -o Scripta
          chmod +x Scripta
      - name: Build HTML
        run: |
          ./Scripta build
      - name: Show changes for debugging
        run: |
          git status
          git diff
      - name: Upload static files as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Setup Pages
        uses: actions/configure-pages@v4

  deploy:
      environment:
        name: github-pages
        url: ${{ steps.deployment.outputs.page_url }}
      runs-on: ubuntu-latest
      needs: build
      steps:
        - name: Deploy to GitHub Pages
          id: deployment
          uses: actions/deploy-pages@v4
